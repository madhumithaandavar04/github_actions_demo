name: nodejs

on:
  push:
    branches:
        - main
   
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - name: Install dependencies with npm 
        run: npm install
        working-directory: modules/01.Nodejs_Pipeline
        continue-on-error: false
        id: install-dependencies

      - name: Run eslint
        run: npm run lint
        working-directory: modules/01.Nodejs_Pipeline
        continue-on-error: false
        id: run-eslint
      
      - name: run jest test
        run: npm test
        working-directory: modules/01.Nodejs_Pipeline
        continue-on-error: false
        id: run-tests
      
      - name: Install railway cli
        run: npm i -g @railway/cli
        working-directory: modules/01.Nodejs_Pipeline
        continue-on-error: false
        id: install-railway

      - name: Deploy to railway
        run: railway up --service github_action
        env: 
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: modules/01.Nodejs_Pipeline
        continue-on-error: false
        id: deploy-to-railway

      - name: check success/failure message
        if: always()
        run: |
            if [ ${{ steps.install-dependencies.outcome}} == "success" ]; then
                echo "😃 dependencies installed successfully"
            else
                echo "failed to install dependencies"
                exit 1
            fi
           
            if [ ${{ steps.run-eslint.outcome}} == "success" ]; then
               echo "❤️ eslint run successfully"
            else
               echo "failed to run eslint"
               exit 1
            fi

            if [ ${{ steps.run-tests.outcome}} == "success" ]; then
               echo "😇 jest test run successfully"
            else
               echo "failed to run jest tests"
               exit 1
            fi

            if [ ${{ steps.install-railway.outcome}} == "success" ]; then
               echo "👀 railway installed successfully"
            else
               echo "failed to run jest tests"
               exit 1
            fi

            if [ ${{ steps.deploy-to-railway.outcome}} == "success" ]; then
               echo "👏🏻 project deployed successfully"
            else
               echo "failed to run jest tests"
               exit 1
            fi

            
